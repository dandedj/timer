<!doctype html>
<html>
  <head>
    <script>
      // Single-page app redirect for GitHub Pages
      // Encodes the path into a query parameter so index.html can restore it
      var base = '/timer/';
      var path = window.location.pathname.slice(base.length);
      var search = window.location.search;
      window.location.replace(
        base + '?p=' + encodeURIComponent(path) + (search ? '&' + search.slice(1) : '')
      );
    </script>
  </head>
</html>
